            const [notification, setNotification] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });
            const [selectedUser, setSelectedUser] = useState(null);
            const [userItems, setUserItems] = useState([]);
            const [userHomeworks, setUserHomeworks] = useState([]);
            const [userTimetable, setUserTimetable] = useState(null);
            const [userSubjects, setUserSubjects] = useState([]);

            const { db } = window.firebaseServices;
            const { collection, getDocs, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, setDoc, getDoc, writeBatch, limit } = window.firebaseServices || {};

            useEffect(() => {
                const unsubConfig = onSnapshot(doc(db, "system_settings", "config"), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        setSystemConfig(data);
                        setAllowedEmails(data.allowedEmails || []);
                        setBlacklistedEmails(data.blacklistedEmails || []);
                    }
                });
                const unsubClasses = onSnapshot(doc(db, "system_settings", "classes"), (doc) => {
                    if (doc.exists()) setSystemClasses(doc.data().list || []);
                });
                const unsubUsers = onSnapshot(collection(db, "users_public"), (snap) => {
                    setUsers(snap.docs.map(d => ({ uid: d.id, ...d.data() })));
                    setStats(prev => ({ ...prev, totalUsers: snap.size }));
                });
                const unsubTasks = onSnapshot(collection(db, "public_assignments"), (snap) => {
                    setPublicTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setStats(prev => ({ ...prev, totalTasks: snap.size }));
                });
                return () => { unsubConfig(); unsubClasses(); unsubUsers(); unsubTasks(); };
            }, [db]);

            const triggerAlert = (message) => setNotification({ isOpen: true, type: 'alert', message, onConfirm: null });
            const triggerConfirm = (message, onConfirmAction) => setNotification({ isOpen: true, type: 'confirm', message, onConfirm: onConfirmAction });
            const closeNotification = () => setNotification(prev => ({ ...prev, isOpen: false }));

            const updateConfig = async (key, value) => { try { await updateDoc(doc(db, "system_settings", "config"), { [key]: value }); } catch (e) { triggerAlert("更新失敗"); } };
            const handleAddWhitelist = async (e) => { e.preventDefault(); if (!newEmail.trim()) return; setIsSubmitting(true); try { await updateDoc(doc(db, "system_settings", "config"), { allowedEmails: arrayUnion(newEmail.trim()) }); setNewEmail(''); triggerAlert("已新增至白名單"); } catch (e) { triggerAlert("新增失敗"); } setIsSubmitting(false); };
            const handleRemoveWhitelist = async (email) => { triggerConfirm(`確定要移除白名單 ${email} 嗎？`, async () => { try { await updateDoc(doc(db, "system_settings", "config"), { allowedEmails: arrayRemove(email) }); triggerAlert("已移除"); } catch (e) { } }); };
            const handleAddBlacklist = async (e) => { e.preventDefault(); if (!newBlacklistEmail.trim()) return; setIsSubmitting(true); try { await updateDoc(doc(db, "system_settings", "config"), { blacklistedEmails: arrayUnion(newBlacklistEmail.trim()) }); setNewBlacklistEmail(''); triggerAlert("已新增至黑名單"); } catch (e) { triggerAlert("新增失敗"); } setIsSubmitting(false); };
            const handleRemoveBlacklist = async (email) => { triggerConfirm(`確定要解除封鎖 ${email} 嗎？`, async () => { try { await updateDoc(doc(db, "system_settings", "config"), { blacklistedEmails: arrayRemove(email) }); triggerAlert("已解除封鎖"); } catch (e) { } }); };
            const handleAddClass = async (e) => {
                e.preventDefault(); if (!newClassCode.trim() || !newClassName.trim()) return;
                const code = newClassCode.trim().toUpperCase();
                const name = newClassName.trim();
                if (systemClasses.some(c => c.code === code)) { triggerAlert("班級代碼已存在"); return; }
                try {
                    await updateDoc(doc(db, 'system_settings', 'classes'), { list: arrayUnion({ code, name, createdAt: new Date().toISOString() }) });
                    setNewClassCode(''); setNewClassName(''); triggerAlert("班級已新增");
                } catch (e) { triggerAlert("新增失敗"); }
            };
            const handleRemoveClass = async (code) => {
                triggerConfirm(`確定要刪除班級 ${code} 嗎？`, async () => {
                    try {
                        const newList = systemClasses.filter(c => c.code !== code);
                        await setDoc(doc(db, 'system_settings', 'classes'), { list: newList });
                        triggerAlert("班級已刪除");
                    } catch (e) { triggerAlert("刪除失敗"); }
                });
            };
            const handleDeleteUser = async (targetUser) => {
                triggerConfirm(`⚠️ 確定要徹底刪除用戶 ${targetUser.displayName || targetUser.email} 的所有資料嗎？此操作不可逆！`, async () => {
                    try {
                        const batch = writeBatch(db);
                        const tasksSnap = await getDocs(collection(db, "users", targetUser.uid, "items"));
                        tasksSnap.forEach(d => batch.delete(d.ref));
                        const itemsSnap = await getDocs(collection(db, "users", targetUser.uid, "items"));
                        itemsSnap.forEach(d => batch.delete(d.ref));
                        batch.delete(doc(db, "users", targetUser.uid, "settings", "timetable"));
                        batch.delete(doc(db, "users", targetUser.uid, "settings", "subjects"));
                        batch.delete(doc(db, "users_public", targetUser.uid));
                        await batch.commit();
                        triggerAlert("用戶資料已清除");
                    } catch (e) { triggerAlert("刪除失敗"); }
                });
            };
            const handleViewUser = async (u) => {
                setSelectedUser(u);
                try {
                    const itemsSnap = await getDocs(query(collection(db, "users", u.uid, "items"), orderBy("dueDate")));
                    const items = itemsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setUserItems(items);
                    setUserHomeworks(items);
                    const ttSnap = await getDoc(doc(db, "users", u.uid, "settings", "timetable"));
                    setUserTimetable(ttSnap.exists() ? ttSnap.data() : null);
                    const subSnap = await getDoc(doc(db, "users", u.uid, "settings", "subjects"));
                    setUserSubjects(subSnap.exists() ? subSnap.data().list : []);
                } catch (e) { triggerAlert("載入用戶資料失敗"); }
            };
            const handleUpdateUserName = async (newName) => {
                if (!newName.trim()) return;
                try {
                    await updateDoc(doc(db, "users_public", selectedUser.uid), { displayName: newName.trim() });
                    setSelectedUser({ ...selectedUser, displayName: newName.trim() });
                    triggerAlert("名稱已更新");
                } catch (e) { triggerAlert("更新失敗"); }
            };
            const handleUpdateUserItem = async (itemId, updatedData) => {
                try {
                    await updateDoc(doc(db, "users", selectedUser.uid, "items", itemId), updatedData);
                    setUserHomeworks(userHomeworks.map(h => h.id === itemId ? { ...h, ...updatedData } : h));
                    triggerAlert("項目已更新");
                } catch (e) { triggerAlert("更新失敗"); }
            };
            const handleDeleteUserItem = async (itemId) => {
                triggerConfirm("確定要刪除此項目嗎？", async () => {
                    try {
                        await deleteDoc(doc(db, "users", selectedUser.uid, "items", itemId));
                        setUserHomeworks(userHomeworks.filter(h => h.id !== itemId));
                        triggerAlert("項目已刪除");
                    } catch (e) { triggerAlert("刪除失敗"); }
                });
            };
            const handleDeletePublicTask = async (taskId) => {
                triggerConfirm("確定要撤回此廣播任務嗎？這將會從所有學生的列表中移除。", async () => {
                    try {
                        const batch = writeBatch(db);
                        batch.delete(doc(db, "public_assignments", taskId));
                        await batch.commit();
                        triggerAlert("任務已撤回");
                    } catch (e) { triggerAlert("撤回失敗"); }
                });
            };

            return (
                <div className="fixed inset-0 z-[200] bg-slate-50 dark:bg-slate-900 flex flex-col md:flex-row overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col shrink-0">
                        <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black">A</div>
                                <h2 className="font-black text-slate-800 dark:text-white">管理後台</h2>
                            </div>
                            <button onClick={onClose} className="md:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full"><Icon name="x" className="w-5 h-5 dark:text-slate-300"/></button>
                        </div>
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                            {[
                                { id: 'overview', label: '數據概覽', icon: 'layout-dashboard' },
                                { id: 'users', label: '用戶管理', icon: 'users' },
                                { id: 'broadcasts', label: '廣播任務', icon: 'megaphone' },
                                { id: 'classes', label: '班級設定', icon: 'school' },
                                { id: 'settings', label: '系統設定', icon: 'settings' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all ${activeTab === tab.id ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                                    <Icon name={tab.icon} className="w-5 h-5" /> {tab.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-100 dark:border-slate-700">
                            <button onClick={onClose} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
                                <Icon name="log-out" className="w-4 h-4" /> 返回前台
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto p-6 md:p-10">
                        {activeTab === 'overview' && (
                            <div className="space-y-8 animate-fadeIn">
                                <div><h3 className="text-2xl font-bold dark:text-white mb-2">數據概覽</h3><p className="text-slate-500 dark:text-slate-400">系統當前運行狀態</p></div>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-slate-400 text-xs font-bold uppercase mb-2">總註冊用戶</div><div className="text-4xl font-black text-indigo-600 dark:text-indigo-400">{stats.totalUsers}</div></div>
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-slate-400 text-xs font-bold uppercase mb-2">總廣播任務</div><div className="text-4xl font-black text-emerald-600 dark:text-emerald-400">{stats.totalTasks}</div></div>
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-slate-400 text-xs font-bold uppercase mb-2">系統版本</div><div className="text-4xl font-black text-slate-800 dark:text-white">v2.4.1</div></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'users' && (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="flex justify-between items-end">
                                    <div><h3 className="text-2xl font-bold dark:text-white mb-2">用戶管理</h3><p className="text-slate-500 dark:text-slate-400">管理所有已註冊的學生帳號</p></div>
                                </div>
                                <div className="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">
                                                    <th className="px-6 py-4">用戶名稱 / 電郵</th>
                                                    <th className="px-6 py-4">最後上線</th>
                                                    <th className="px-6 py-4 text-right">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                                {users.map(u => (
                                                    <tr key={u.uid} className="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                                                        <td className="px-6 py-4">
                                                            <div className="font-bold dark:text-white">{u.displayName || '未設定名稱'}</div>
                                                            <div className="text-xs text-slate-400">{u.email}</div>
                                                        </td>
                                                        <td className="px-6 py-4 text-sm text-slate-500 dark:text-slate-400">
                                                            {u.lastSeen ? new Date(u.lastSeen.seconds * 1000).toLocaleString() : '未知'}
                                                        </td>
                                                        <td className="px-6 py-4 text-right space-x-2">
                                                            <button onClick={() => handleViewUser(u)} className="px-3 py-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-600 hover:text-white rounded-lg font-bold text-xs transition-all">查看詳情</button>
                                                            <button onClick={() => handleDeleteUser(u)} className="px-3 py-1.5 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-600 hover:text-white rounded-lg font-bold text-xs transition-all">刪除</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'broadcasts' && (
                            <div className="space-y-6 animate-fadeIn">
                                <div><h3 className="text-2xl font-bold dark:text-white mb-2">廣播任務管理</h3><p className="text-slate-500 dark:text-slate-400">查看並撤回已發送的廣播功課</p></div>
                                <div className="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">
                                                    <th className="px-6 py-4">科目 / 內容</th>
                                                    <th className="px-6 py-4">目標班級</th>
                                                    <th className="px-6 py-4 text-right">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                                {publicTasks.map(task => {
                                                    const subjectConfig = DEFAULT_SUBJECTS.find(s => s.name === task.subject) || DEFAULT_SUBJECTS[DEFAULT_SUBJECTS.length - 1];
                                                    return (
                                                        <tr key={task.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                                                            <td className="px-6 py-4">
                                                                <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold mb-1 ${subjectConfig.color}`}>{task.subject}</span>
                                                                <div className="text-sm font-medium dark:text-slate-200 line-clamp-1">{task.description}</div>
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                <span className="px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded-lg text-xs font-bold dark:text-slate-300">{task.targetClass || '全校'}</span>
                                                            </td>
                                                            <td className="px-6 py-4 text-right">
                                                                <button onClick={() => handleDeletePublicTask(task.id)} className="px-3 py-1.5 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-500 hover:text-white rounded-lg font-bold text-xs">撤回</button>
                                                            </td>
                                                        </tr>
                                                    )
                                                })}
                                                {publicTasks.length === 0 && <tr><td colSpan="3" className="px-6 py-12 text-center text-slate-400">暫無廣播任務</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-8 animate-fadeIn max-w-2xl">
                                <div><h3 className="text-2xl font-bold dark:text-white mb-2">核心系統設定</h3></div>

                                {/* 白名單系統設定 */}
                                <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden p-1">
                                    <div className="p-5 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 flex justify-between items-center">
                                            <h4 className="font-bold dark:text-white flex items-center gap-2"><Icon name="shield-check" className="w-5 h-5 text-emerald-500"/> 白名單系統</h4>
                                            <label className="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" className="sr-only peer" checked={systemConfig?.whitelistEnabled || false} onChange={(e) => updateConfig('whitelistEnabled', e.target.checked)} />
                                                <div className="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-300 dark:peer-focus:ring-emerald-800 rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-emerald-600"></div>
                                                <span className="ml-3 text-sm font-medium text-slate-900 dark:text-slate-300">{systemConfig?.whitelistEnabled ? '已啟用' : '已停用'}</span>
                                            </label>
                                    </div>
                                    <div className="p-5">
                                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">當啟用白名單模式時，只有下列清單中的電郵地址可以登入並使用系統。</p>
                                            
                                            <form onSubmit={handleAddWhitelist} className="flex gap-2 mb-4">
                                                <input type="email" placeholder="輸入電郵地址..." value={newEmail} onChange={e => setNewEmail(e.target.value)} className="flex-1 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-emerald-500 outline-none" required />
                                                <button type="submit" disabled={isSubmitting} className="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-emerald-700 transition-colors flex items-center gap-2"><Icon name="plus" className="w-4 h-4"/> 新增</button>
                                            </form>

                                            <div className="max-h-60 overflow-y-auto border border-slate-100 dark:border-slate-700 rounded-xl">
                                                {allowedEmails.length === 0 ? (
                                                    <div className="p-8 text-center text-slate-400 text-sm">白名單目前為空</div>
                                                ) : (
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400">
                                                            <tr><th className="px-4 py-2">電郵地址</th><th className="px-4 py-2 text-right">操作</th></tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                                            {allowedEmails.map(email => (
                                                                <tr key={email} className="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                                                                    <td className="px-4 py-3 dark:text-slate-300">{email}</td>
                                                                    <td className="px-4 py-3 text-right">
                                                                        <button onClick={() => handleRemoveWhitelist(email)} className="text-red-500 hover:text-red-700"><Icon name="trash-2" className="w-4 h-4"/></button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                )}
                                            </div>
                                    </div>
                                </div>

                                {/* 黑名單系統設定 */}
                                <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden p-1">
                                    <div className="p-5 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 flex justify-between items-center">
                                            <h4 className="font-bold dark:text-white flex items-center gap-2"><Icon name="user-x" className="w-5 h-5 text-red-500"/> 黑名單系統</h4>
                                    </div>
                                    <div className="p-5">
                                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">被列入黑名單的電郵地址將無法登入系統。</p>
                                            
                                            <form onSubmit={handleAddBlacklist} className="flex gap-2 mb-4">
                                                <input type="email" placeholder="輸入要封鎖的電郵..." value={newBlacklistEmail} onChange={e => setNewBlacklistEmail(e.target.value)} className="flex-1 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-red-500 outline-none" required />
                                                <button type="submit" disabled={isSubmitting} className="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-700 transition-colors flex items-center gap-2"><Icon name="ban" className="w-4 h-4"/> 封鎖</button>
                                            </form>

                                            <div className="max-h-60 overflow-y-auto border border-slate-100 dark:border-slate-700 rounded-xl">
                                                {blacklistedEmails.length === 0 ? (
                                                    <div className="p-8 text-center text-slate-400 text-sm">黑名單目前為空</div>
                                                ) : (
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400">
                                                            <tr><th className="px-4 py-2">電郵地址</th><th className="px-4 py-2 text-right">操作</th></tr>

                                                                    <td className="px-4 py-3 dark:text-slate-300">{email}</td>

                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>

                                            </div>

                                </div>

                    {/* User Detail Modal */}
                    {selectedUser && (

                                <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">

                                            <h5 className="font-black text-slate-800 dark:text-white flex items-center gap-2 pt-4"><Icon name="tag" className="w-5 h-5 text-indigo-500"/> 自定義科目</h5>

                    {/* Notification Overlay */}
                    {notification.isOpen && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-fadeIn"></div>
                            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-xs p-6 relative z-10 text-center pop-in-error">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${notification.type === 'confirm' ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'}`}>
                                    <Icon name={notification.type === 'confirm' ? 'help-circle' : 'alert-circle'} className="w-8 h-8" />
                                </div>
                                <p className="text-slate-800 dark:text-white font-bold mb-6">{notification.message}</p>
                                <div className="flex gap-3">
                                    {notification.type === 'confirm' ? (
                                        <>
                                            <button onClick={closeNotification} className="flex-1 py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl font-bold text-sm hover:bg-slate-200 transition-all">取消</button>
                                            <button onClick={() => { notification.onConfirm(); closeNotification(); }} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/30">確定</button>
                                        </>
                                    ) : (
                                        <button onClick={closeNotification} className="w-full py-3 bg-slate-800 dark:bg-slate-700 text-white rounded-xl font-bold text-sm hover:bg-slate-900 transition-all">知道了</button>

        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [items, setItems] = useState([]);
            const itemsRef = useRef([]);
            const [viewMode, setViewMode] = useState('current');
            const [inputType, setInputType] = useState('homework');
            const [subject, setSubject] = useState('中文');
            const [description, setDescription] = useState('');
            const [dueDate, setDueDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedImage, setSelectedImage] = useState(null);
            const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
            const [isJoinClassOpen, setIsJoinClassOpen] = useState(false);
            const [isAppearanceOpen, setIsAppearanceOpen] = useState(false);
            const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
            const [notification, setNotification] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });
            const [exitingIds, setExitingIds] = useState([]);
            const [filterSubject, setFilterSubject] = useState('全部');
            const [sortOption, setSortOption] = useState('date_asc');
            const [isListVisible, setIsListVisible] = useState(true);
            const [appMode, setAppMode] = useState('personal');
            const [isBroadcast, setIsBroadcast] = useState(false);
            const [targetClassInput, setTargetClassInput] = useState('全校');
            const [systemClasses, setSystemClasses] = useState([]);
            const [userProfile, setUserProfile] = useState(null);
            const [showNameSetup, setShowNameSetup] = useState(false);
            const [nameSetupLoading, setNameSetupLoading] = useState(false);
            const [systemConfig, setSystemConfig] = useState(null);
            const [quickView, setQuickView] = useState({ isOpen: false, title: '', items: [] });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [pageLoadTime] = useState(Date.now());
            const [autoDeleteRan] = useRef(false);
            const fileInputRef = useRef(null);

            // Appearance Settings
            const [themeColor, setThemeColor] = useState(() => localStorage.getItem('themeColor') || 'indigo');
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [layoutMode, setLayoutMode] = useState(() => localStorage.getItem('layoutMode') || 'normal');
            const [customLayout, setCustomLayout] = useState(() => {
                const saved = localStorage.getItem('customLayout');
                return saved ? JSON.parse(saved) : { cards: true, timetable: true, input: true, list: true };
            });

            // Timetable & Subjects
            const [timetableConfig, setTimetableConfig] = useState({ timeSlots: DEFAULT_TIME_SLOTS, schedule: DEFAULT_SCHEDULE });
            const [subjects, setSubjects] = useState(DEFAULT_SUBJECTS);

            const { auth, db, signOut, onAuthStateChanged, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, where, getDocs, setDoc, updateProfile, arrayUnion, writeBatch } = window.firebaseServices || {};

            const isAdmin = user?.email === ADMIN_EMAIL;
            const joinedClassesStr = userProfile?.joinedClasses?.join(',') || '';
            const t = THEME_CONFIG[themeColor] || THEME_CONFIG.indigo;

            useEffect(() => {
                localStorage.setItem('themeColor', themeColor);
                localStorage.setItem('darkMode', isDarkMode);
                localStorage.setItem('layoutMode', layoutMode);
                localStorage.setItem('customLayout', JSON.stringify(customLayout));
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [themeColor, isDarkMode, layoutMode, customLayout]);

            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    try {
                        if (u) {
                            const configSnap = await getDoc(doc(db, "system_settings", "config"));
                            const config = configSnap.exists() ? configSnap.data() : {};
                            if (config.blacklistedEmails?.includes(u.email)) { await signOut(auth); triggerAlert("您的帳號已被封鎖，無法登入。"); return; }
                            if (config.whitelistEnabled && !config.allowedEmails?.includes(u.email) && u.email !== ADMIN_EMAIL) { await signOut(auth); triggerAlert("系統目前僅限白名單用戶登入。"); return; }
                            setUser(u);
                            const publicSnap = await getDoc(doc(db, "users_public", u.uid));
                            if (publicSnap.exists()) { setUserProfile(publicSnap.data()); if (!u.displayName) setShowNameSetup(true); }
                            else { setShowNameSetup(true); }
                            updateDoc(doc(db, "users_public", u.uid), { lastSeen: serverTimestamp() }).catch(e=>{});
                            setLoading(false);
                            setTimeout(() => document.getElementById('loading-screen')?.classList.add('hidden-loader'), 500);
                        } else {
                            setUser(null); setLoading(false);
                            setTimeout(() => document.getElementById('loading-screen')?.classList.add('hidden-loader'), 500);
                            setItems([]); setIsAdmin(false); setShowNameSetup(false); setUserProfile(null); setTimetableConfig({ timeSlots: DEFAULT_TIME_SLOTS, schedule: DEFAULT_SCHEDULE }); setSubjects(DEFAULT_SUBJECTS);
                        }
                    } catch (e) { console.warn("Auth err:", e); }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsubItems = onSnapshot(query(collection(db, "users", user.uid, "items"), orderBy("dueDate")), (snapshot) => {
                    const loadedItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(loadedItems);
                    itemsRef.current = loadedItems; // 同步儲存至 Ref 以供其他 Effect 讀取
                }, (err) => console.warn("Items err:", err));
                const unsubTimetable = onSnapshot(doc(db, 'users', user.uid, 'settings', 'timetable'), (docSnap) => setTimetableConfig(docSnap.exists() && docSnap.data().timeSlots ? docSnap.data() : { timeSlots: DEFAULT_TIME_SLOTS, schedule: DEFAULT_SCHEDULE }), (err) => console.warn("Timetable err:", err));
                const unsubSubjects = onSnapshot(doc(db, 'users', user.uid, 'settings', 'subjects'), (docSnap) => setSubjects(docSnap.exists() && docSnap.data().list ? docSnap.data().list : DEFAULT_SUBJECTS), (err) => console.warn("Subjects err:", err));
                const unsubConfig = onSnapshot(doc(db, "system_settings", "config"), (doc) => { if (doc.exists()) setSystemConfig(doc.data()); });
                const unsubClasses = onSnapshot(doc(db, "system_settings", "classes"), (doc) => { if (doc.exists()) setSystemClasses(doc.data().list || []); });
                const unsubProfile = onSnapshot(doc(db, "users_public", user.uid), (doc) => { if (doc.exists()) setUserProfile(doc.data()); });
                return () => { unsubItems(); unsubTimetable(); unsubSubjects(); unsubConfig(); unsubClasses(); unsubProfile(); };
            }, [user, db]);

            // 背景自動清理：超過兩日的舊任務
            useEffect(() => {
                if (!user || !db || items.length === 0) return;
                if (autoDeleteRan.current) return;
                const today = new Date(); today.setHours(0,0,0,0);
                const toDelete = items.filter(item => {
                    const due = new Date(item.dueDate); due.setHours(0,0,0,0);
                    const diffDays = Math.floor((today - due) / 86400000);
                    return diffDays >= 2;
                });
                if (toDelete.length > 0) {
                    autoDeleteRan.current = true;
                    const batch = writeBatch(db);
                    toDelete.forEach(item => { batch.delete(doc(db, "users", user.uid, "items", item.id)); });
                    batch.commit().catch(e => console.warn("Auto delete failed", e));
                } else { autoDeleteRan.current = true; }
            }, [user, items, db]);

            // [架構修復] 處理廣播任務同步機制
            useEffect(() => {
                if (!user || !db) return;
                const q = query(collection(db, "public_assignments"), orderBy("createdAt", "desc"));
                const unsubscribe = onSnapshot(q, async (snapshot) => { 
                    try {
                        const currentClasses = userProfile?.joinedClasses || [];
                        const existingItems = itemsRef.current;
                        const existingPublicIds = new Set(existingItems.map(i => i.publicRefId).filter(Boolean));
                        const addPromises = [];
                        const batch = writeBatch(db);
                        let hasBatchOp = false;

                        for (const change of snapshot.docChanges()) { 
                            try {
                                const publicData = change.doc.data(); const publicId = change.doc.id; 
                                const target = publicData.targetClass || '全校';
                                const isForMe = isAdmin || target === '全校' || currentClasses.includes(target); 

                                if (change.type === "added" && isForMe) { 
                                    if (!existingPublicIds.has(publicId)) { 
                                        addPromises.push(addDoc(collection(db, "users", user.uid, "items"), { ...publicData, publicRefId: publicId, completed: false, forceExpired: publicData.forceExpired || false })); 
                                        const createdTime = publicData.createdAt ? new Date(publicData.createdAt).getTime() : 0;
                                        if (createdTime > pageLoadTime) triggerAlert(`收到新功課：[${publicData.subject || '其他'}] ${publicData.description}`); 
                                    } 
                                } 
                                if (change.type === "removed") { 
                                    const toDelete = existingItems.filter(i => i.publicRefId === publicId);
                                    toDelete.forEach(item => { batch.delete(doc(db, "users", user.uid, "items", item.id)); hasBatchOp = true; });
                                } 
                                if (change.type === "modified") { 
                                    const toUpdate = existingItems.filter(i => i.publicRefId === publicId);
                                    toUpdate.forEach(item => { batch.update(doc(db, "users", user.uid, "items", item.id), { forceExpired: publicData.forceExpired === true }); hasBatchOp = true; });
                                } 
                            } catch (e) { console.warn("Task process err:", e); }
                        }
                        if (addPromises.length > 0) await Promise.all(addPromises);
                        if (hasBatchOp) await batch.commit();
                    } catch (e) { console.warn("Public tasks wrapper err:", e); }
                }, (err) => console.warn("Public tasks err:", err)); 
                return () => unsubscribe(); 
            }, [user, db, userProfile?.joinedClasses, pageLoadTime, isAdmin]);

            const triggerAlert = (message) => setNotification({ isOpen: true, type: 'alert', message, onConfirm: null });
            const triggerConfirm = (message, onConfirmAction) => setNotification({ isOpen: true, type: 'confirm', message, onConfirm: onConfirmAction });
            const closeNotification = () => setNotification(prev => ({ ...prev, isOpen: false }));
            const handleNotificationConfirm = () => { if (notification.onConfirm) notification.onConfirm(); closeNotification(); };
            const isGuest = !user;

            const handleNameSetupSave = async (name) => { 
                if (!user) return; setNameSetupLoading(true); 
                try { await updateProfile(user, { displayName: name }); await setDoc(doc(db, "users_public", user.uid), { email: user.email, displayName: name, lastSeen: serverTimestamp() }, { merge: true }); setShowNameSetup(false); triggerAlert(`歡迎, ${name}!`); } 
                catch (e) { triggerAlert("設定失敗，請重試"); } finally { setNameSetupLoading(false); } 
            };

            const handleJoinClassSubmit = async (code, name) => {
                try {
                    await updateDoc(doc(db, "users_public", user.uid), { joinedClasses: arrayUnion(code) });
                    triggerAlert(`成功加入班級：${name}`);
                    setIsJoinClassOpen(false);
                } catch(e) { triggerAlert("加入失敗，請重試"); }
            };

            const handleSubmit = async (e) => { 
                e.preventDefault(); if (isGuest) { setIsAuthModalOpen(true); return; }
                if ((!description.trim() && !selectedImage) || !dueDate) { triggerAlert("請輸入功課內容！"); return; }
                
                const performSubmit = async () => {
                    const newItem = { type: inputType, subject, description: description.trim(), image: selectedImage, dueDate, completed: false, createdAt: new Date().toISOString() }; 
                    try { 
                        if (isBroadcast && isAdmin) { 
                            newItem.senderName = user.displayName || '老師'; newItem.targetClass = targetClassInput;
                            await addDoc(collection(db, "public_assignments"), newItem); 
                            const className = targetClassInput === '全校' ? '全校' : (systemClasses.find(c => c.code === targetClassInput)?.name || targetClassInput);
                            triggerAlert(`已發放功課給 ${className}！`); 
                        } else { await addDoc(collection(db, "users", user.uid, "items"), newItem); triggerAlert("已新增紀錄"); } 
                        setDescription(''); setSelectedImage(null); if (fileInputRef.current) fileInputRef.current.value = ""; setAppMode('personal'); setIsBroadcast(false); setTargetClassInput('全校');
                    } catch (error) { triggerAlert("新增失敗"); } 
                };

                if (isBroadcast && isAdmin) {
                    const targetName = targetClassInput === '全校' ? '全校' : (systemClasses.find(c => c.code === targetClassInput)?.name || targetClassInput);
                    triggerConfirm(`確定要發送廣播功課給【${targetName}】嗎？`, performSubmit);
                } else { performSubmit(); }
            };

            const handleToggle = (id, currentCompletedStatus) => { 
                if (isGuest) { setIsAuthModalOpen(true); return; }
                if (!currentCompletedStatus) { 
                    setExitingIds(prev => [...prev, id]); setTimeout(async () => { try { await updateDoc(doc(db, "users", user.uid, "items", id), { completed: true }); } catch (e) {} setExitingIds(prev => prev.filter(eid => eid !== id)); }, 500); 
                } else { updateDoc(doc(db, "users", user.uid, "items", id), { completed: false }).catch(()=>{}); } 
            };

            const deleteItem = (id) => { if (isGuest) return; triggerConfirm('確定要刪除這項紀錄？', async () => { try { await deleteDoc(doc(db, "users", user.uid, "items", id)); } catch (e) { triggerAlert("刪除失敗"); } }); };
            const deletePublicItem = (publicId, privateId) => { if (isGuest) return; triggerConfirm('⚠️ 確定要刪除全班的這份功課？', async () => { try { await deleteDoc(doc(db, "public_assignments", publicId)); if (privateId) await deleteDoc(doc(db, "users", user.uid, "items", privateId)); triggerAlert("已刪除"); } catch (e) { triggerAlert("刪除失敗"); } }); };
            
            const handleClearHistory = () => {
                if (isGuest) { setIsAuthModalOpen(true); return; }
                const completedItems = items.filter(item => item.completed);
                if (completedItems.length === 0) { triggerAlert("目前沒有任何已完成的歷史紀錄！"); return; }
                triggerConfirm(`確定要一鍵清理全部 ${completedItems.length} 個歷史紀錄嗎？（此操作無法復原）`, async () => {
                    try {
                        const batch = writeBatch(db);
                        completedItems.forEach(item => batch.delete(doc(db, "users", user.uid, "items", item.id)));
                        await batch.commit();
                        triggerAlert(`成功刪除了 ${completedItems.length} 個歷史紀錄！`);
                    } catch(e) { triggerAlert("清理過程發生錯誤"); }
                });
            };

            const activeItems = items.filter(i => !i.completed && !i.forceExpired);
            const displayedItems = items.filter(item => {
                if (viewMode === 'history' && !item.completed) return false;
                if (viewMode === 'current' && item.completed) return false;
                if (filterSubject !== '全部' && (item.subject || '其他') !== filterSubject) return false;
                return true;
            }).sort((a, b) => {
                const dateA = new Date(a.dueDate); const dateB = new Date(b.dueDate);
                if (a.forceExpired !== b.forceExpired) return a.forceExpired ? 1 : -1;
                return sortOption === 'date_desc' ? dateB - dateA : dateA - dateB;
            });

            const counts = {
                today: activeItems.filter(i => i.dueDate === new Date().toISOString().split('T')[0]).length,
                tomorrow: activeItems.filter(i => i.dueDate === new Date(Date.now() + 86400000).toISOString().split('T')[0]).length,
                future: activeItems.filter(i => i.dueDate > new Date(Date.now() + 86400000).toISOString().split('T')[0]).length,
                test: activeItems.filter(i => i.type !== 'homework').length
            };

            const isVisible = (componentName) => {
                if (viewMode === 'history') return componentName === 'list';
                if (layoutMode === 'normal') return true;
                if (layoutMode === 'minimal') return componentName === 'cards' || componentName === 'list';
                if (layoutMode === 'custom') return customLayout[componentName];
                return true;
            };

            if (systemConfig?.maintenanceMode && systemConfig.maintenanceMode !== 'normal' && !isAdmin) {
                return <MaintenanceOverlay type={systemConfig.maintenanceMode} user={user} onLogin={() => setIsAuthModalOpen(true)} />;
            }

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-all ${t.lightBg}`}>
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 ${t.bg} rounded-2xl flex items-center justify-center text-white shadow-lg rotate-3`}>
                                    <Icon name="book" className="w-6 h-6" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tight dark:text-white">電子手冊 <span className="text-[10px] bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 px-1.5 py-0.5 rounded ml-1">v2.4</span></h1>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Digital Handbook</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {isAdmin && <button onClick={() => setIsAdminPanelOpen(true)} className="p-2 text-slate-500 hover:bg-white/50 dark:hover:bg-slate-800/50 rounded-xl transition-all"><Icon name="shield" className="w-5 h-5" /></button>}
                                <button onClick={() => setIsAppearanceOpen(true)} className="p-2 text-slate-500 hover:bg-white/50 dark:hover:bg-slate-800/50 rounded-xl transition-all"><Icon name="palette" className="w-5 h-5" /></button>
                                {user ? (
                                    <button onClick={() => triggerConfirm("確定要登出嗎？", () => signOut(auth))} className="flex items-center gap-2 pl-2 pr-3 py-1.5 bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 rounded-2xl hover:shadow-md transition-all">
                                        <div className={`w-7 h-7 ${t.bg} rounded-full flex items-center justify-center text-white text-xs font-bold`}>{user.displayName?.[0] || 'U'}</div>
                                        <span className="text-xs font-bold dark:text-slate-300 hidden sm:inline">{user.displayName || '學生'}</span>
                                    </button>
                                ) : (
                                    <button onClick={() => setIsAuthModalOpen(true)} className={`px-4 py-2 ${t.bg} text-white rounded-xl font-bold text-sm shadow-lg transition-all hover:scale-105 active:scale-95`}>登入</button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6 space-y-8">
                        {/* Status Cards */}
                        {isVisible('cards') && (
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                {[
                                    { label: '今天到期', count: counts.today, icon: 'calendar-days', color: 'text-rose-500', bg: 'bg-rose-50 dark:bg-rose-900/20' },
                                    { label: '明天到期', count: counts.tomorrow, icon: 'calendar-clock', color: 'text-amber-500', bg: 'bg-amber-50 dark:bg-amber-900/20' },
                                    { label: '日後要交', count: counts.future, icon: 'calendar-range', color: 'text-indigo-500', bg: 'bg-indigo-50 dark:bg-indigo-900/20' },
                                    { label: '測考默書', count: counts.test, icon: 'graduation-cap', color: 'text-emerald-500', bg: 'bg-emerald-50 dark:bg-emerald-900/20' }
                                ].map((card, i) => (
                                    <div key={i} className={`p-4 rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 shadow-sm flex flex-col items-center text-center group hover:border-indigo-300 transition-all`}>
                                        <div className={`w-10 h-10 ${card.bg} ${card.color} rounded-2xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform`}><Icon name={card.icon} className="w-5 h-5" /></div>
                                        <div className="text-2xl font-black dark:text-white">{card.count}</div>
                                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{card.label}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Input Section */}
                        {isVisible('input') && (
                            <section className="bg-white dark:bg-slate-800 rounded-[2rem] p-6 shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700 relative overflow-hidden">
                                <div className={`absolute top-0 left-0 w-full h-1 ${t.bg}`}></div>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="flex flex-wrap gap-2">
                                        {['homework', 'test', 'quiz', 'dictation'].map(type => (
                                            <button key={type} type="button" onClick={() => setInputType(type)} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${inputType === type ? `${t.bg} text-white shadow-lg` : 'bg-slate-100 dark:bg-slate-900 text-slate-500 hover:bg-slate-200'}`}>
                                                {type === 'homework' ? '功課' : type === 'test' ? '考試' : type === 'quiz' ? '測驗' : '默書'}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                        <div className="md:col-span-3">
                                            <select value={subject} onChange={e => setSubject(e.target.value)} className="w-full h-12 px-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none font-bold text-sm focus:ring-2 focus:ring-indigo-500 dark:text-white outline-none">
                                                {subjects.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-6">
                                            <input type="text" value={description} onChange={e => setDescription(e.target.value)} placeholder="輸入功課內容..." className="w-full h-12 px-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none font-bold text-sm focus:ring-2 focus:ring-indigo-500 dark:text-white outline-none" />
                                        </div>
                                        <div className="md:col-span-3">
                                            <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} className="w-full h-12 px-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border-none font-bold text-sm focus:ring-2 focus:ring-indigo-500 dark:text-white outline-none" />
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between pt-2">
                                        <div className="flex items-center gap-4">
                                            {isAdmin && (
                                                <label className="flex items-center gap-2 cursor-pointer group">
                                                    <input type="checkbox" checked={isBroadcast} onChange={e => setIsBroadcast(e.target.checked)} className="sr-only peer" />
                                                    <div className="w-10 h-5 bg-slate-200 dark:bg-slate-700 rounded-full relative peer-checked:bg-indigo-600 transition-colors after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                                                    <span className="text-xs font-bold text-slate-500 group-hover:text-indigo-600 transition-colors">廣播給全班</span>
                                                </label>
                                            )}
                                            {isBroadcast && (
                                                <select value={targetClassInput} onChange={e => setTargetClassInput(e.target.value)} className="text-xs font-bold bg-slate-100 dark:bg-slate-900 px-3 py-1.5 rounded-lg outline-none border-none dark:text-white">
                                                    <option value="全校">全校</option>
                                                    {systemClasses.map(c => <option key={c.code} value={c.code}>{c.name}</option>)}
                                                </select>
                                            )}
                                        </div>
                                        <button type="submit" className={`h-12 px-8 ${t.bg} text-white rounded-2xl font-black text-sm shadow-xl hover:scale-105 active:scale-95 transition-all flex items-center gap-2`}>
                                            <Icon name="plus" className="w-5 h-5" /> 新增紀錄
                                        </button>
                                    </div>
                                </form>
                            </section>
                        )}

                        {/* List Section */}
                        {isVisible('list') && (
                            <section className="space-y-6">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div className="flex bg-white dark:bg-slate-800 p-1 rounded-2xl border border-slate-200 dark:border-slate-700 w-fit">
                                        <button onClick={() => setViewMode('current')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${viewMode === 'current' ? `${t.bg} text-white shadow-lg` : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>進行中</button>
                                        <button onClick={() => setViewMode('history')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${viewMode === 'history' ? `${t.bg} text-white shadow-lg` : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>歷史記錄</button>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <select value={filterSubject} onChange={e => setFilterSubject(e.target.value)} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-xs font-bold outline-none dark:text-white">
                                            <option value="全部">所有科目</option>
                                            {subjects.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                        </select>
                                        {viewMode === 'history' && (
                                            <button onClick={handleClearHistory} className="p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-xl transition-all" title="清空歷史記錄"><Icon name="trash-2" className="w-5 h-5" /></button>
                                        )}
                                    </div>
                                </div>

                                <div className={`grid grid-cols-1 gap-4 transition-all duration-300 ${isListVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                                    {displayedItems.map((item, idx) => {
                                        const isExiting = exitingIds.includes(item.id);
                                        const isCompleted = item.completed || isExiting;
                                        const subjectConfig = subjects.find(s => s.name === item.subject) || subjects[subjects.length - 1];
                                        
                                        return (
                                            <div key={item.id} className={`group bg-white dark:bg-slate-800 rounded-3xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all flex items-start gap-4 animate-item`} style={{ animationDelay: `${idx * 0.05}s` }}>
                                                <button onClick={() => handleToggle(item.id, item.completed)} className={`mt-1 w-8 h-8 rounded-full border-2 flex items-center justify-center shrink-0 transition-all ${isCompleted ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 dark:border-slate-600 hover:border-emerald-400'}`}>
                                                    {isCompleted && <Icon name="check" className="w-5 h-5" />}
                                                </button>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-black uppercase ${subjectConfig.color}`}>{item.subject || '其他'}</span>
                                                        {item.type !== 'homework' && <span className="px-2 py-0.5 rounded text-[10px] font-black uppercase bg-rose-100 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400">測考</span>}
                                                        {item.publicRefId && <span className="px-2 py-0.5 rounded text-[10px] font-black uppercase bg-indigo-100 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 flex items-center gap-1"><Icon name="globe" className="w-2.5 h-2.5" /> 廣播</span>}
                                                    </div>
                                                    <h3 className={`font-bold text-slate-800 dark:text-slate-100 break-words ${isCompleted ? 'line-through opacity-50' : ''}`}>{item.description}</h3>
                                                    <div className="flex items-center gap-3 mt-2">
                                                        <div className="flex items-center gap-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider"><Icon name="calendar" className="w-3 h-3" /> {item.dueDate}</div>
                                                        {!isCompleted && (
                                                            <div className={`text-[10px] font-black px-2 py-0.5 rounded-full ${new Date(item.dueDate) < new Date().setHours(0,0,0,0) ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-500'}`}>
                                                                {new Date(item.dueDate) < new Date().setHours(0,0,0,0) ? '已過期' : '進行中'}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    {item.publicRefId ? (
                                                        isAdmin && <button onClick={() => deletePublicItem(item.publicRefId, item.id)} className="p-2 text-slate-400 hover:text-rose-500 transition-colors"><Icon name="globe" className="w-4 h-4" /></button>
                                                    ) : (
                                                        <button onClick={() => deleteItem(item.id)} className="p-2 text-slate-400 hover:text-rose-500 transition-colors"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {displayedItems.length === 0 && (
                                        <div className="py-20 text-center space-y-4">
                                            <div className="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto text-slate-300"><Icon name="inbox" className="w-10 h-10" /></div>
                                            <p className="text-slate-400 font-bold">目前沒有任何項目</p>
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Modals & Overlays */}
                    <AppearanceModal isOpen={isAppearanceOpen} onClose={() => setIsAppearanceOpen(false)} t={t} themeColor={themeColor} setThemeColor={setThemeColor} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} layoutMode={layoutMode} setLayoutMode={setLayoutMode} customLayout={customLayout} setCustomLayout={setCustomLayout} />
                    {isAdminPanelOpen && <AdminPanel user={user} onClose={() => setIsAdminPanelOpen(false)} />}
                    
                    {/* Auth Modal */}
                    {isAuthModalOpen && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsAuthModalOpen(false)}></div>
                            <div className="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8 relative z-10 text-center animate-pop-in">
                                <div className={`w-20 h-20 ${t.bg} rounded-3xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl rotate-6`}><Icon name="user" className="w-10 h-10" /></div>
                                <h3 className="text-2xl font-black dark:text-white mb-2">歡迎回來</h3>
                                <p className="text-slate-500 dark:text-slate-400 text-sm font-medium mb-8">請使用 Google 帳號登入以同步您的功課紀錄</p>
                                <button onClick={async () => { try { await window.firebaseServices.signInWithPopup(auth, window.firebaseServices.googleProvider); setIsAuthModalOpen(false); } catch(e) { triggerAlert("登入失敗"); } }} className="w-full py-4 bg-white dark:bg-slate-700 border-2 border-slate-100 dark:border-slate-600 rounded-2xl font-black text-sm flex items-center justify-center gap-3 hover:bg-slate-50 dark:hover:bg-slate-600 transition-all shadow-sm">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="Google" /> 使用 Google 登入
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Name Setup Modal */}
                    {showNameSetup && (
                        <div className="fixed inset-0 z-[160] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md"></div>
                            <div className="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8 relative z-10 animate-pop-in">
                                <h3 className="text-2xl font-black dark:text-white mb-2">設定您的名稱</h3>
                                <p className="text-slate-500 dark:text-slate-400 text-sm font-medium mb-6">這將顯示在您的個人檔案中</p>
                                <input type="text" placeholder="輸入您的名稱..." className="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-900 border-2 border-transparent focus:border-indigo-500 outline-none font-bold dark:text-white mb-6 transition-all" onKeyDown={(e) => { if (e.key === 'Enter') handleNameSetupSave(e.target.value); }} />
                                <button onClick={(e) => handleNameSetupSave(e.currentTarget.previousSibling.value)} disabled={nameSetupLoading} className={`w-full py-4 ${t.bg} text-white rounded-2xl font-black shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2`}>
                                    {nameSetupLoading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : '開始使用'}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Notification */}
                    {notification.isOpen && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={closeNotification}></div>
                            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-xs p-6 relative z-10 text-center pop-in-error">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${notification.type === 'confirm' ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'}`}>
                                    <Icon name={notification.type === 'confirm' ? 'help-circle' : 'alert-circle'} className="w-8 h-8" />
                                </div>
                                <p className="text-slate-800 dark:text-white font-bold mb-6">{notification.message}</p>
                                <div className="flex gap-3">
                                    {notification.type === 'confirm' ? (
                                        <>
                                            <button onClick={closeNotification} className="flex-1 py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl font-bold text-sm hover:bg-slate-200 transition-all">取消</button>
                                            <button onClick={handleNotificationConfirm} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/30">確定</button>
                                        </>
                                    ) : (
                                        <button onClick={closeNotification} className="w-full py-3 bg-slate-800 dark:bg-slate-700 text-white rounded-xl font-bold text-sm hover:bg-slate-900 transition-all">知道了</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
