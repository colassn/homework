<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8VCPLTE2QT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8VCPLTE2QT');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <title>電子手冊 v7.0 PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, sans-serif; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .dark #loading-screen { background: #0f172a; color: white; }
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 7s infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900">
    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 class="mt-4 font-bold">正在啟動電子手冊 v7.0...</h2>
    </div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, where, getDocs, setDoc, arrayUnion, arrayRemove, getDoc, writeBatch, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3gYuwnyoTUwO7PFh4Nuue-Ud8GTruuRk",
            authDomain: "recordhwv2.firebaseapp.com",
            projectId: "recordhwv2",
            storageBucket: "recordhwv2.firebasestorage.app",
            messagingSenderId: "599261009391",
            appId: "1:599261009391:web:66cd7f932650bebc0e521a",
            measurementId: "G-C51XDYW67W"
        };

        const app = initializeApp(firebaseConfig);
        window.firebaseServices = { 
            auth: getAuth(app), db: getFirestore(app), googleProvider: new GoogleAuthProvider(),
            signInWithPopup, onAuthStateChanged, signOut,
            collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, where, getDocs, setDoc, arrayUnion, arrayRemove, getDoc, writeBatch, limit
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const ADMIN_EMAIL = 'chimhinhin@gmail.com';

        // --- Components ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Settings Center ---
        function SettingsCenter({ isOpen, onClose, user, isAdmin, themeColor, setThemeColor, isDarkMode, setIsDarkMode, onLogout }) {
            if (!isOpen) return null;
            const colors = [
                { id: 'indigo', bg: 'bg-indigo-600', text: 'text-indigo-600' },
                { id: 'rose', bg: 'bg-rose-600', text: 'text-rose-600' },
                { id: 'emerald', bg: 'bg-emerald-600', text: 'text-emerald-600' },
                { id: 'amber', bg: 'bg-amber-600', text: 'text-amber-600' }
            ];

            return (
                <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={onClose}></div>
                    <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 relative z-10 shadow-2xl border border-white/20">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-black dark:text-white">設定中心</h2>
                            <button onClick={onClose} className="p-2 bg-slate-100 dark:bg-slate-700 rounded-full"><Icon name="x" /></button>
                        </div>
                        
                        <div className="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-3xl mb-8 border border-slate-100 dark:border-slate-700">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center text-white text-2xl font-bold">
                                    {user?.displayName?.[0] || user?.email?.[0]?.toUpperCase() || 'U'}
                                </div>
                                <div>
                                    <div className="font-black text-lg dark:text-white">{user?.displayName || '用戶'}</div>
                                    <div className="text-sm text-slate-500">{user?.email}</div>
                                    {isAdmin && <span className="inline-block mt-1 px-2 py-0.5 bg-amber-100 text-amber-700 text-[10px] font-bold rounded">超級管理員</span>}
                                </div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 block">外觀主題</label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setIsDarkMode(false)} className={`flex items-center justify-center gap-2 py-3 rounded-2xl font-bold border-2 transition-all ${!isDarkMode ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-100 dark:border-slate-700 text-slate-500'}`}><Icon name="sun" /> 淺色</button>
                                    <button onClick={() => setIsDarkMode(true)} className={`flex items-center justify-center gap-2 py-3 rounded-2xl font-bold border-2 transition-all ${isDarkMode ? 'border-indigo-600 bg-indigo-900/30 text-indigo-400' : 'border-slate-100 dark:border-slate-700 text-slate-500'}`}><Icon name="moon" /> 深色</button>
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 block">主題顏色</label>
                                <div className="flex gap-4">
                                    {colors.map(c => (
                                        <button key={c.id} onClick={() => setThemeColor(c.id)} className={`w-10 h-10 rounded-full ${c.bg} transition-all ${themeColor === c.id ? 'ring-4 ring-offset-2 ring-indigo-500 scale-110' : 'opacity-60'}`}></button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <button onClick={onLogout} className="w-full mt-10 py-4 bg-rose-50 text-rose-600 dark:bg-rose-900/20 dark:text-rose-400 rounded-2xl font-black flex items-center justify-center gap-2 transition-all active:scale-95"><Icon name="log-out" /> 登出帳號</button>
                    </div>
                </div>
            );
        }

        // --- Main App ---
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [viewMode, setViewMode] = useState('current'); // current, admin, timetable, history
            const [appMode, setAppMode] = useState('class'); // class, personal
            const [isDarkMode, setIsDarkMode] = useState(localStorage.getItem('theme') === 'dark');
            const [themeColor, setThemeColor] = useState(localStorage.getItem('themeColor') || 'indigo');
            const [isPreferencesOpen, setIsPreferencesOpen] = useState(false);
            const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);

            const { auth, db, googleProvider, signInWithPopup, onAuthStateChanged, signOut } = window.firebaseServices || {};

            useEffect(() => {
                if (!auth) return;
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-screen');
                    if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                });
                return unsub;
            }, [auth]);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            const isAdmin = user?.email === ADMIN_EMAIL;
            const t = {
                bg: themeColor === 'rose' ? 'bg-rose-600' : themeColor === 'emerald' ? 'bg-emerald-600' : themeColor === 'amber' ? 'bg-amber-600' : 'bg-indigo-600',
                text: themeColor === 'rose' ? 'text-rose-600' : themeColor === 'emerald' ? 'text-emerald-600' : themeColor === 'amber' ? 'text-amber-600' : 'text-indigo-600',
                lightBg: themeColor === 'rose' ? 'bg-rose-50' : themeColor === 'emerald' ? 'bg-emerald-50' : themeColor === 'amber' ? 'bg-amber-50' : 'bg-indigo-50'
            };

            if (loading) return null;

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-slate-900">
                        <div className="max-w-md w-full text-center space-y-8">
                            <div className={`w-24 h-24 mx-auto rounded-[2.5rem] ${t.bg} flex items-center justify-center text-white shadow-2xl`}><Icon name="book-open" className="w-12 h-12" /></div>
                            <div>
                                <h1 className="text-4xl font-black tracking-tight dark:text-white">電子手冊</h1>
                                <p className="text-slate-500 mt-2 font-medium">高效管理您的學習生活</p>
                            </div>
                            <button onClick={() => signInWithPopup(auth, googleProvider)} className="w-full py-4 bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-3xl font-black flex items-center justify-center gap-3 shadow-xl hover:bg-slate-50 transition-all active:scale-95 dark:text-white">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" className="w-6 h-6" /> 使用 Google 登入
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-900 font-sans relative overflow-hidden p-4 sm:p-8">
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0 opacity-40">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-400/20 blur-[120px] rounded-full animate-blob"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-400/20 blur-[120px] rounded-full animate-blob" style={{animationDelay: '2s'}}></div>
                    </div>

                    <div className="max-w-[1200px] mx-auto relative z-10">
                        <nav className="sticky top-0 z-[100] bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl border-b border-slate-200/50 dark:border-slate-800/50 px-6 py-4 mb-8 rounded-3xl shadow-sm flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setViewMode('current')}>
                                <div className={`w-10 h-10 rounded-2xl ${t.bg} flex items-center justify-center text-white shadow-lg`}><Icon name="book-open" /></div>
                                <h1 className="text-xl font-black dark:text-white hidden sm:block">電子手冊 <span className="text-[10px] bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded ml-1 text-slate-500">v7.0 PRO</span></h1>
                            </div>
                            
                            <div className="flex items-center bg-slate-100/50 dark:bg-slate-800/50 p-1 rounded-2xl">
                                {[{ id: 'class', label: '班級', icon: 'users' }, { id: 'personal', label: '個人', icon: 'user' }].map(mode => (
                                    <button key={mode.id} onClick={() => setAppMode(mode.id)} className={`flex items-center gap-2 px-6 py-2 rounded-xl text-sm font-bold transition-all ${appMode === mode.id ? `bg-white dark:bg-slate-700 shadow-md ${t.text}` : 'text-slate-500'}`}><Icon name={mode.icon} className="w-4 h-4" />{mode.label}</button>
                                ))}
                            </div>

                            <div className="flex items-center gap-2">
                                {isAdmin && <button onClick={() => setViewMode('admin')} className={`p-2.5 rounded-xl ${viewMode === 'admin' ? `${t.lightBg} ${t.text}` : 'text-slate-500'}`}><Icon name="shield-check" /></button>}
                                <button onClick={() => setIsPreferencesOpen(true)} className="p-2.5 rounded-xl text-slate-500"><Icon name="settings" /></button>
                            </div>
                        </nav>

                        <div className="max-w-3xl mx-auto space-y-6 pb-24">
                            {appMode === 'class' ? (
                                <div className="text-center py-20 bg-white/50 dark:bg-slate-800/50 backdrop-blur-xl rounded-[3rem] border-2 border-dashed border-slate-200 dark:border-slate-700">
                                    <Icon name="school" className="w-20 h-20 mx-auto text-slate-300 mb-6" />
                                    <h2 className="text-2xl font-black text-slate-700 dark:text-slate-200">班級模式功能整合中</h2>
                                    <p className="text-slate-500 mt-2">請先切換至個人模式使用功課紀錄</p>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-sm border border-white/50 dark:border-slate-700/50">
                                        <h3 className="text-2xl font-black mb-6 dark:text-white">新增功課</h3>
                                        <div className="flex gap-3">
                                            <input type="text" placeholder="今天要完成什麼？" className="flex-1 px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border-none rounded-2xl font-bold text-sm focus:ring-2 focus:ring-indigo-500/50" />
                                            <button className={`px-8 py-4 rounded-2xl font-black text-sm text-white shadow-lg ${t.bg}`}>新增</button>
                                        </div>
                                    </div>
                                    <div className="bg-white/50 dark:bg-slate-800/50 backdrop-blur-xl p-10 rounded-[2.5rem] text-center border border-white/50">
                                        <Icon name="clipboard-list" className="w-16 h-16 mx-auto text-slate-300 mb-4" />
                                        <p className="text-slate-500 font-bold">數據載入完成，開始規劃您的一天吧！</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <SettingsCenter 
                        isOpen={isPreferencesOpen} onClose={() => setIsPreferencesOpen(false)} 
                        user={user} isAdmin={isAdmin} themeColor={themeColor} setThemeColor={setThemeColor} 
                        isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} onLogout={() => signOut(auth)} 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
